<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tips and Tricks HOW TO</title>
  <style>
    :root { --brand:#0a6f66; --ink:#1f2937; --muted:#4b5563; }
    * { box-sizing:border-box; }
    body { margin:0; font-family: "DM Sans", "Segoe UI", Arial, sans-serif; color:var(--ink); }
    .page {
      width: 100vw; height: 100vh;
      display:flex; align-items:center; justify-content:center;
      background: radial-gradient(circle at 12% 12%, #e0f2f1, #f8fafc 45%, #ffffff 100%);
      padding: 56px;
    }
    .card {
      width: 100%; max-width: 720px;
      border: 1px solid #cbd5e1;
      border-radius: 18px;
      background: rgba(255,255,255,.92);
      box-shadow: 0 16px 36px rgba(15,23,42,.14);
      padding: 40px;
    }
    .brand { text-transform: uppercase; letter-spacing: .12em; color:var(--brand); font-size:12px; font-weight:700; }
    h1 { font-size: 42px; margin: 10px 0 14px; line-height: 1.08; }
    .desc { font-size: 16px; color: var(--muted); line-height: 1.6; margin: 0 0 24px; }
    .meta { font-size: 13px; color: var(--muted); border-top:1px solid #e5e7eb; padding-top: 12px; }
    .tag { display:inline-block; margin-top: 6px; padding: 5px 10px; border:1px solid #99f6e4; border-radius:999px; color:#065f46; background:#ecfdf5; font-size:11px; font-weight:700; text-transform:uppercase; }
  </style>
</head>
<body>
  <main class="page">
    <section class="card">
      <div class="brand">Patrick Kabanda</div>
      <h1>Tips and Tricks HOW TO</h1>
      <p class="desc">A professional resource from my work portfolio. This branded edition includes the original content in full on the following pages.</p>
      <span class="tag">Portfolio Resource</span>
      <p class="meta">Prepared for lead magnet delivery • patrickkabanda.dev</p>
    </section>
  </main>
</body>
</html>
